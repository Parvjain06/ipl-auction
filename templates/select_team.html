<!DOCTYPE html>
<html>

<head>
    <title>Select Team — IPL Auction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 40px;
            color: #fff;
        }

        a {
            text-decoration: none;
            color: #fff;
        }

        h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 40px;
        }

        .back {
            display: block;
            text-align: center;
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .back:hover {
            color: #fff;
        }

        .teams {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .team-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 35px 40px;
            text-align: center;
            transition: all .3s;
            min-width: 180px;
        }

        .team-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-4px);
            border-color: #ffd200;
        }

        .team-card .name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .team-card .budget {
            font-size: 0.9rem;
            color: #aaa;
        }

        .team-card .budget strong {
            color: #2ed573;
        }
    </style>
</head>

<body>

    <a href="/" class="back">← Back to Home</a>
    <h1>🏆 Select Your Team</h1>
    <p class="subtitle">Choose a team to start bidding</p>

    <div class="teams">
        {% for t in teams %}
        <a href="/team/{{t.name}}" class="team-card">
            <div class="name">{{t.name}}</div>
            <div class="budget">Budget: <strong>{{t.budget}}</strong></div>
        </a>
        {% endfor %}
    </div>

</body>

</html>
