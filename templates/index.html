<!DOCTYPE html>
<html>

<head>
    <title>IPL Auction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 50px;
        }

        .roles {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .role-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px 50px;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            transition: all .3s ease;
        }

        .role-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .role-card .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .role-card .label {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .role-card .desc {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🏏 IPL Auction</h1>
        <p class="subtitle">Select your role to enter</p>
        <div class="roles">
            <a href="/auctioneer" class="role-card">
                <div class="icon">🎙️</div>
                <div class="label">Auctioneer</div>
                <div class="desc">Start auctions & confirm bids</div>
            </a>
            <a href="/select_team" class="role-card">
                <div class="icon">🏆</div>
                <div class="label">Team</div>
                <div class="desc">Place bids & build your squad</div>
            </a>
        </div>
    </div>
</body>

</html>
