<!DOCTYPE html>
<html>

<head>
    <title>Login — IPL Auction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 420px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #ffd200;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }

        .back {
            display: block;
            margin-bottom: 20px;
            color: #aaa;
            font-size: 0.85rem;
            text-decoration: none;
        }

        .back:hover {
            color: #fff;
        }

        .error {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .field {
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 1rem;
        }

        input::placeholder {
            color: #666;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #000;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }

        button[type="submit"]:hover {
            opacity: 0.9;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .signup-link a {
            color: #ffd200;
            text-decoration: none;
        }

        .hint {
            font-size: 0.8rem;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="card">
        <a href="/" class="back">← Back to Home</a>
        <h1>Login</h1>
        <p class="subtitle">Enter your credentials to continue</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">

            <div class="field">
                <label>Username</label>
                <input type="text" name="username" placeholder="e.g. auctioneer, MI, CSK..." required>
                <p class="hint">Auctioneer enters "auctioneer" · Teams enter team name (MI, CSK, etc.)</p>
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <p class="signup-link">New here? <a href="/signup">Sign up</a></p>
    </div>
</body>

</html>
